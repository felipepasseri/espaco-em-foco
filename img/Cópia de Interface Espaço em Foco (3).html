    <script>
        let ultimoSelecionado = null
        let item1 = 0;
        function navegar(radio) {
            item1++
            if(radio == document.querySelector('input[id="item-1"]:checked')){
                if(item1 == 1){
                    ultimoSelecionado = radio;
                }
            }
            if (radio.checked && radio === ultimoSelecionado) {
                // Se o botão de rádio já estava selecionado, redireciona
                window.location.href = radio.value;
            } else {
                // Atualiza o último botão selecionado
                ultimoSelecionado = radio;
            }
        }
